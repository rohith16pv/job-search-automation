linkedin:
  queries:
    - "Senior Product Manager payments"
    - "Staff Product Manager fintech"
    - "Product Manager payments"
    - "Senior Product Manager fraud"
    - "Senior PM embedded finance"
    - "Senior Product Manager risk"
    - "Senior Product Manager money movement"
    - "Senior Product Manager financial services"
    - "Senior Product Manager billing"
    - "Technical Product Manager fintech"
  location: "United States"
  date_posted: "past-week"  # week window — a missed daily run no longer loses postings; dedup absorbs repeats

indeed:
  queries:
    - "Senior Product Manager payments"
    - "Staff Product Manager fintech"
    - "Product Manager payments"
    - "Senior PM financial services"
  location: "United States"
  radius: "100"
  date_posted: "7"  # days — survives missed daily runs; dedup absorbs repeats

wellfound:
  queries:
    - "product manager payments"
    - "product manager fintech"
    - "senior pm fintech"
  stage:
    - "Series B"
    - "Series C"
    - "Series D"
    - "Public"
