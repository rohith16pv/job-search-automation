# Scoring weights must sum to 100.
weights:
  title_match: 20
  domain_keywords: 35
  skills_match: 25
  seniority_match: 15
  location: 5

# Title keywords — case-insensitive substring match on job title only (not description).
# Check order in scorer.py: blockers → above_level → perfect → good → partial → no match (0).
# above_level is intentionally checked before perfect so bare "pm" in perfect
# does not accidentally score "Staff PM" or "Principal PM" at 20 pts.
title_scoring:

  blockers:       # 0 pts — hard reject, checked first
    # Way too senior
    - "chief product"           # CPO / Chief Product Officer
    - "evp"                     # Executive VP
    - "svp"                     # Senior VP
    - "vp of product"
    - "vp, product"
    - "vp product"              # e.g. "VP Product Management"
    - "vice president"
    - "director of product"
    - "director, product"
    - "product director"
    - "head of product"
    # Too junior
    - "associate product manager"
    - "junior product manager"
    - "apm"                     # Associate PM — no trailing space so "APM, Payments" is caught
    - "entry level"
    # Non-PM roles — irrelevant
    - "product designer"
    - "product design"
    - "program manager"         # Technical Program Manager ≠ Product Manager
    - "project manager"
    - "product marketing"
    - "marketing manager"
    - "software engineer"
    - "data engineer"
    - "data scientist"
    - "sales manager"
    - "account manager"
    - "vp of engineering"
    - "vp of sales"
    - "product analyst"
    - "product specialist"
    - "product operations"

  above_level:    # 14 pts — above target; tracked in P1, won't auto-trigger P0 GDoc
                  # MUST be before perfect in check order (see scorer.py note)
    # Full forms
    - "staff product manager"
    - "principal product manager"
    - "group product manager"
    - "lead product manager"
    - "product lead"
    # Short forms — critical: these must be here before "pm" is matched in perfect
    - "staff pm"
    - "principal pm"
    - "group pm"
    - "lead pm"

  perfect:        # 20 pts — exact target levels (Senior PM sweet spot)
    # Senior PM — full forms with period variants
    - "senior product manager"
    - "senior pm"
    - "sr. product manager"
    - "sr. pm"
    - "sr product manager"      # no-period variant
    - "sr pm"                   # no-period variant
    - "product manager, senior"
    # Numbered levels
    - "product manager ii"
    - "product manager 2"
    - "product manager iii"     # PM3 — at some companies this is Staff, but treat as perfect
    - "product manager 3"
    - "pm ii"                   # short-form numbered
    - "pm 2"
    - "pm iii"
    - "pm 3"
    # Technical PM — target level
    - "senior technical product manager"
    - "technical product manager"
    - "technical pm"
    # Specialised PM titles — all treated as perfect since they're the same IC level
    - "product manager, growth"
    - "product manager, platform"
    - "product manager, payments"
    - "product manager, fintech"
    - "product manager, api"
    - "product manager, infrastructure"
    - "product manager, developer"
    - "product manager, embedded"
    - "product manager, risk"
    - "product manager, compliance"
    - "product manager, core"
    - "product manager, data"
    # Bare "pm" — catches "PM, Payments" / "PM - Embedded Finance" / "PM, Fintech"
    # Safe here because above_level catches "Staff PM" / "Principal PM" BEFORE this runs
    - "pm"
    # Generic — catches any remaining "Product Manager, XYZ" pattern not listed above
    - "product manager"

# Domain keywords (fintech/payments focus) — each match adds points up to max
domain_keywords:
  tier1:          # 5 pts each, max 25
    - "payments"
    - "fintech"
    - "settlement"
    - "ach"
    - "embedded finance"
    - "baas"
    - "cross-border"
    - "money movement"
    - "financial services"
    - "payment infrastructure"
  tier2:          # 3 pts each, max 10
    - "rtp"
    - "treasury"
    - "fx"
    - "rails"
    - "liquidity"
    - "banking"
    - "lending"
    - "credit"
    - "insurance"
    - "wealthtech"

# Skills from resume — each match adds points up to max
skills_keywords:
  - keyword: "api"
    points: 4
  - keyword: "platform"
    points: 3
  - keyword: "b2b"
    points: 3
  - keyword: "saas"
    points: 2
  - keyword: "compliance"
    points: 3
  - keyword: "regulatory"
    points: 3
  - keyword: "fraud"
    points: 3
  - keyword: "risk"
    points: 2
  - keyword: "infrastructure"
    points: 3
  - keyword: "roadmap"
    points: 2
  - keyword: "cross-functional"
    points: 2
  - keyword: "stakeholder"
    points: 2
  - keyword: "data"
    points: 2
  - keyword: "analytics"
    points: 2
  - keyword: "developer"
    points: 2
  - keyword: "enterprise"
    points: 2
  - keyword: "scale"
    points: 2

# Seniority signals in description — presence scores points
seniority_signals:
  required_senior:   # 15 pts — Senior PM (IC3) range
    - "5+ years"
    - "6+ years"
    - "7+ years"
    - "8+ years"
    - "senior"
    - "technical pm"
  open:              # 10 pts — general PM range
    - "3+ years"
    - "4+ years"
  too_junior:        # 0 pts
    - "0-2 years"
    - "1-3 years"
    - "entry level"
    - "associate"
    - "new grad"

# Location scoring
location_scoring:
  remote: 5          # "remote" in location
  hybrid_us: 4       # "hybrid" + US location
  us_onsite: 3       # US city with no remote mention
  non_us: 1          # Non-US location

# Minimum score to appear in results at all (below this → silently dropped)
min_score_threshold: 40

# Routing thresholds
routing:
  p1_min: 50         # Score ≥ 50 → P1 Backlog
  p0_min: 70         # Score ≥ 70 → Ready to Apply (resume tailored)
