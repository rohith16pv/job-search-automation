# Scoring weights must sum to 100.
weights:
  title_match: 20
  domain_keywords: 35
  skills_match: 25
  seniority_match: 15
  location: 5

# Title keywords that score points (case-insensitive partial match on job title)
# Target levels: IC2 (PM) through IC5 (Staff/Principal) — excludes Director/VP/C-suite
title_scoring:
  perfect:        # 20 pts — Senior / Staff / Principal PM
    - "staff product manager"
    - "principal product manager"
    - "group product manager"
    - "senior product manager"
    - "senior pm"
    - "sr. product manager"
    - "sr. pm"
    - "product manager ii"
    - "product manager 2"
    - "product manager, senior"
    - "senior technical product manager"
    - "lead product manager"
    - "product lead"
  good:           # 14 pts — PM level (IC2) and Technical PM
    - "technical product manager"
    - "technical pm"
    - "product manager, growth"
    - "product manager, platform"
    - "product manager"
  blockers:       # 0 pts — auto-reject (wrong level or irrelevant)
    - "director of product"
    - "director, product"
    - "product director"
    - "head of product"
    - "vp of product"
    - "vp, product"
    - "associate product manager"
    - "junior product manager"
    - "apm "
    - "product designer"
    - "product design"
    - "vp of engineering"
    - "vp of sales"
    - "software engineer"
    - "data engineer"
    - "data scientist"
    - "sales manager"
    - "account manager"
    - "marketing manager"
    - "program manager"
    - "project manager"

# Domain keywords (fintech/payments focus) — each match adds points up to max
domain_keywords:
  tier1:          # 5 pts each, max 25
    - "payments"
    - "fintech"
    - "settlement"
    - "ach"
    - "embedded finance"
    - "baas"
    - "cross-border"
    - "money movement"
    - "financial services"
    - "payment infrastructure"
  tier2:          # 3 pts each, max 10
    - "rtp"
    - "treasury"
    - "fx"
    - "rails"
    - "liquidity"
    - "banking"
    - "lending"
    - "credit"
    - "insurance"
    - "wealthtech"

# Skills from resume — each match adds points up to max
skills_keywords:
  - keyword: "api"
    points: 4
  - keyword: "platform"
    points: 3
  - keyword: "b2b"
    points: 3
  - keyword: "saas"
    points: 2
  - keyword: "compliance"
    points: 3
  - keyword: "regulatory"
    points: 3
  - keyword: "fraud"
    points: 3
  - keyword: "risk"
    points: 2
  - keyword: "infrastructure"
    points: 3
  - keyword: "roadmap"
    points: 2
  - keyword: "cross-functional"
    points: 2
  - keyword: "stakeholder"
    points: 2
  - keyword: "data"
    points: 2
  - keyword: "analytics"
    points: 2
  - keyword: "developer"
    points: 2
  - keyword: "enterprise"
    points: 2
  - keyword: "scale"
    points: 2

# Seniority signals in description — presence scores points
seniority_signals:
  required_senior:   # 15 pts — Senior PM (IC3) range
    - "5+ years"
    - "6+ years"
    - "7+ years"
    - "8+ years"
    - "senior"
    - "technical pm"
  open:              # 10 pts — general PM range
    - "3+ years"
    - "4+ years"
  too_junior:        # 0 pts
    - "0-2 years"
    - "1-3 years"
    - "entry level"
    - "associate"
    - "new grad"

# Location scoring
location_scoring:
  remote: 5          # "remote" in location
  hybrid_us: 4       # "hybrid" + US location
  us_onsite: 3       # US city with no remote mention
  non_us: 1          # Non-US location

# Minimum score to appear in results at all (below this → silently dropped)
min_score_threshold: 40

# Routing thresholds
routing:
  p1_min: 50         # Score ≥ 50 → P1 Backlog
  p0_min: 70         # Score ≥ 70 → Ready to Apply (resume tailored)
